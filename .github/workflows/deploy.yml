name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  deploy_production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production base path)
        run: npm run build

      - name: Deploy production site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          force_orphan: true

  deploy_preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      BRANCH_SLUG: ${{ github.head_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Normalize branch name for URL path
        run: |
          SLUG=$(echo "$BRANCH_SLUG" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+|-+$//g')
          echo "BRANCH_SLUG=$SLUG" >> "$GITHUB_ENV"

      - name: Build preview site
        env:
          DEPLOY_BASE: /IntroAboutLitFramework/previews/${{ env.BRANCH_SLUG }}/
        run: npm run build

      - name: Deploy preview site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: previews/${{ env.BRANCH_SLUG }}
          keep_files: true

      - name: Add preview URL to job summary
        run: |
          echo "Preview URL: https://${{ github.repository_owner }}.github.io/IntroAboutLitFramework/previews/${{ env.BRANCH_SLUG }}/" >> "$GITHUB_STEP_SUMMARY"
