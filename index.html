<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lit Framework 完全指南</title>
  <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />

  <!-- Prism.js syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism.min.css" id="prism-theme-light" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css" id="prism-theme-dark" disabled />

  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <!-- Mobile Top Bar -->
  <header id="top-bar">
    <button id="hamburger" aria-label="開啟目錄" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    <span class="top-bar-title">Lit Framework 完全指南</span>
    <div class="header-controls">
      <button id="theme-toggle-mobile" aria-label="切換主題" title="切換深淺色主題">
        <span class="theme-icon">☀</span>
      </button>
    </div>
  </header>

  <!-- Overlay (shared by drawer and sections panel) -->
  <div id="overlay" aria-hidden="true"></div>

  <!-- Mobile Left Drawer (chapters only) -->
  <aside id="mobile-drawer" aria-label="章節目錄" aria-hidden="true">
    <div class="drawer-header">
      <span>目錄</span>
      <button id="drawer-close" aria-label="關閉目錄">✕</button>
    </div>
    <div class="drawer-toolbar">
      <div class="language-menu-wrap" data-language-menu>
        <button
          type="button"
          class="language-menu-trigger"
          aria-label="選擇語言"
          aria-haspopup="true"
          aria-expanded="false"
          title="語言選項（即將推出）"
          disabled
        >
          <span class="language-label">繁體中文</span>
          <span class="language-caret" aria-hidden="true">▾</span>
        </button>
        <div class="language-menu" role="menu" aria-label="語言選單" hidden>
          <button type="button" class="language-menu-item" role="menuitemradio" aria-checked="false" disabled>
            <span>English</span>
          </button>
          <button type="button" class="language-menu-item is-active" role="menuitemradio" aria-checked="true" disabled>
            <span>繁體中文</span>
          </button>
        </div>
      </div>
    </div>
    <nav id="drawer-nav"></nav>
    <div class="drawer-footer">
      <a
        class="sidebar-github-link"
        href="https://github.com/kw0006667/IntroAboutLitFramework"
        target="_blank"
        rel="noreferrer"
        aria-label="在 GitHub 開啟此 repository"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55 0-.27-.01-.99-.02-1.95-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.25 3.33.96.1-.74.4-1.25.72-1.54-2.55-.29-5.23-1.28-5.23-5.67 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.47.11-3.06 0 0 .96-.31 3.15 1.18a10.9 10.9 0 0 1 5.74 0c2.18-1.49 3.14-1.18 3.14-1.18.63 1.59.24 2.77.12 3.06.73.8 1.18 1.83 1.18 3.08 0 4.41-2.69 5.38-5.25 5.66.41.35.78 1.04.78 2.1 0 1.52-.01 2.74-.01 3.12 0 .3.2.66.79.55A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
        </svg>
        <span>GitHub Repository</span>
      </a>
    </div>
  </aside>

  <!-- Mobile Right Sections Panel -->
  <aside id="sections-panel" aria-label="本章節目" aria-hidden="true">
    <div class="drawer-header">
      <span>本章節目</span>
      <button id="sections-close" aria-label="關閉節目清單">✕</button>
    </div>
    <nav id="sections-nav"></nav>
  </aside>

  <!-- Main App Grid -->
  <div id="app">
    <!-- Desktop Sidebar -->
    <aside id="sidebar" aria-label="章節目錄">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4 6v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V6L12 2z" fill="var(--color-accent)" opacity="0.9"/>
            <path d="M12 5l-5 2.5v4c0 3.47 2.4 6.71 5 7.5 2.6-.79 5-4.03 5-7.5v-4L12 5z" fill="white" opacity="0.3"/>
          </svg>
          <span>Lit 完全指南</span>
        </div>
        <div class="header-controls">
          <button id="theme-toggle" aria-label="切換主題" title="切換深淺色主題">
            <span class="theme-icon">☀</span>
          </button>
        </div>
        <button id="sidebar-collapse-toggle" aria-label="收起側欄" title="收起側欄">
          <span aria-hidden="true">←</span>
        </button>
      </div>
      <div class="sidebar-toolbar">
        <div class="language-menu-wrap" data-language-menu>
          <button
            type="button"
            class="language-menu-trigger"
            aria-label="選擇語言"
            aria-haspopup="true"
            aria-expanded="false"
            title="語言選項（即將推出）"
            disabled
          >
            <span class="language-label">繁體中文</span>
            <span class="language-caret" aria-hidden="true">▾</span>
          </button>
          <div class="language-menu" role="menu" aria-label="語言選單" hidden>
            <button type="button" class="language-menu-item" role="menuitemradio" aria-checked="false" disabled>
              <span>English</span>
            </button>
            <button type="button" class="language-menu-item is-active" role="menuitemradio" aria-checked="true" disabled>
              <span>繁體中文</span>
            </button>
          </div>
        </div>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <a
          class="sidebar-github-link"
          href="https://github.com/kw0006667/IntroAboutLitFramework"
          target="_blank"
          rel="noreferrer"
          aria-label="在 GitHub 開啟此 repository"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55 0-.27-.01-.99-.02-1.95-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.25 3.33.96.1-.74.4-1.25.72-1.54-2.55-.29-5.23-1.28-5.23-5.67 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.47.11-3.06 0 0 .96-.31 3.15 1.18a10.9 10.9 0 0 1 5.74 0c2.18-1.49 3.14-1.18 3.14-1.18.63 1.59.24 2.77.12 3.06.73.8 1.18 1.83 1.18 3.08 0 4.41-2.69 5.38-5.25 5.66.41.35.78 1.04.78 2.1 0 1.52-.01 2.74-.01 3.12 0 .3.2.66.79.55A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
          </svg>
          <span>GitHub Repository</span>
        </a>
      </div>
    </aside>

    <!-- Content Area -->
    <main id="content-area">
      <div id="content-wrapper">
        <div id="content-body">
          <!-- Chapter content injected here -->
          <div class="loading-placeholder">
            <div class="loading-spinner"></div>
            <p>載入中...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <button id="sidebar-expand-toggle" aria-label="展開側欄" title="展開側欄" aria-expanded="true">
    <span aria-hidden="true">→</span>
  </button>

  <!-- Mobile Sections Toggle Button -->
  <button id="sections-toggle" aria-label="查看本章節目" aria-expanded="false">
    <span>≡</span> 節目
  </button>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
  <script>
    if (typeof Prism !== 'undefined' && Prism.plugins && Prism.plugins.autoloader) {
      Prism.plugins.autoloader.languages_path = 'https://cdn.jsdelivr.net/npm/prismjs@1/components/';
    }
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
